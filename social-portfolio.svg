<svg width="180" height="52" viewBox="0 0 180 52" fill="none"
     xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Portfolio">
  <defs>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0e17"/><stop offset="1" stop-color="#0c1322"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="brGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#60a5fa" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#60a5fa" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="pill"><rect x="1" y="1" width="178" height="50" rx="14"/></clipPath>
  </defs>

  <g clip-path="url(#pill)">
    <rect x="1" y="1" width="178" height="50" rx="14" fill="url(#cardBg)"/>
    <circle cx="31" cy="26" r="30" fill="url(#brGlow)">
      <animate attributeName="opacity" values="0.45;0.85;0.45" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>
  <rect x="1" y="1" width="178" height="50" rx="14" fill="none" stroke="url(#brand)" stroke-width="1.5"/>

  <!-- Code-globe icon: circle + code chevrons -->
  <circle cx="31" cy="26" r="13" fill="none" stroke="url(#brand)" stroke-width="2"/>
  <path d="M28 21 L24 26 L28 31" fill="none" stroke="url(#brand)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M34 21 L38 26 L34 31" fill="none" stroke="url(#brand)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="58" y="31" font-family="ui-monospace,SFMono-Regular,Menlo,monospace"
        font-size="14" font-weight="600" fill="#e2e8f0">My Portfolio</text>
</svg>

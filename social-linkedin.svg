<svg width="150" height="52" viewBox="0 0 150 52" fill="none"
     xmlns="http://www.w3.org/2000/svg" role="img" aria-label="LinkedIn">
  <defs>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0e17"/><stop offset="1" stop-color="#0c1322"/>
    </linearGradient>
    <radialGradient id="liGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#0a66c2" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#0a66c2" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="pill"><rect x="1" y="1" width="148" height="50" rx="14"/></clipPath>
  </defs>

  <g clip-path="url(#pill)">
    <rect x="1" y="1" width="148" height="50" rx="14" fill="url(#cardBg)"/>
    <circle cx="31" cy="26" r="30" fill="url(#liGlow)">
      <animate attributeName="opacity" values="0.45;0.85;0.45" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>
  <rect x="1" y="1" width="148" height="50" rx="14" fill="none" stroke="#0a66c2" stroke-width="1.5"/>

  <!-- LinkedIn icon -->
  <rect x="18" y="13" width="26" height="26" rx="6" fill="none" stroke="#3b9ae1" stroke-width="2"/>
  <text x="31" y="33" font-family="ui-monospace,SFMono-Regular,Menlo,monospace"
        font-size="15" font-weight="700" fill="#3b9ae1" text-anchor="middle">in</text>

  <text x="58" y="31" font-family="ui-monospace,SFMono-Regular,Menlo,monospace"
        font-size="14" font-weight="600" fill="#e2e8f0">LinkedIn</text>
</svg>

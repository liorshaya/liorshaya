<svg width="156" height="52" viewBox="0 0 156 52" fill="none"
     xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Instagram">
  <defs>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0e17"/><stop offset="1" stop-color="#0c1322"/>
    </linearGradient>
    <linearGradient id="ig" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#f9ce34"/>
      <stop offset="0.5" stop-color="#ee2a7b"/>
      <stop offset="1" stop-color="#6228d7"/>
    </linearGradient>
    <radialGradient id="igGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ee2a7b" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ee2a7b" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="pill"><rect x="1" y="1" width="154" height="50" rx="14"/></clipPath>
  </defs>

  <g clip-path="url(#pill)">
    <rect x="1" y="1" width="154" height="50" rx="14" fill="url(#cardBg)"/>
    <circle cx="31" cy="26" r="30" fill="url(#igGlow)">
      <animate attributeName="opacity" values="0.45;0.85;0.45" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>
  <rect x="1" y="1" width="154" height="50" rx="14" fill="none" stroke="url(#ig)" stroke-width="1.5"/>

  <!-- Camera icon -->
  <rect x="18" y="13" width="26" height="26" rx="8" fill="none" stroke="url(#ig)" stroke-width="2"/>
  <circle cx="31" cy="26" r="7" fill="none" stroke="url(#ig)" stroke-width="2"/>
  <circle cx="39" cy="18" r="1.8" fill="url(#ig)"/>

  <text x="58" y="31" font-family="ui-monospace,SFMono-Regular,Menlo,monospace"
        font-size="14" font-weight="600" fill="#e2e8f0">Instagram</text>
</svg>
